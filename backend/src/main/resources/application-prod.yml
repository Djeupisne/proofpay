spring:
  profiles:
    active: prod

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

proofpay:
  cors:
    allowed-origins: ${PROOFPAY_CORS_ORIGINS:?PROOFPAY_CORS_ORIGINS required}
  jwt:
    secret: ${JWT_SECRET:?JWT_SECRET required}
  storage:
    provider: ${PROOFPAY_STORAGE_PROVIDER:local}
  payment:
    active-provider: ${PROOFPAY_PAYMENT_PROVIDER:mock}
  notification:
    async: true

logging:
  level:
    root: WARN
    com.proofpay: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"