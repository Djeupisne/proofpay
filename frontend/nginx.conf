server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression pour réduire le poids transféré (JS/CSS Angular).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;

    # En-têtes de sécurité de base (defense in depth ; l'API applique déjà
    # ses propres règles CORS/JWT côté backend).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Ne jamais exposer les fichiers cachés (.git, .env oubliés dans le build, etc.)
    location ~ /\. {
        deny all;
    }

    # Angular build avec hash dans le nom de fichier : cache long + immutable.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # index.html : jamais de cache (sinon les déploiements ne sont pas vus par les clients).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
